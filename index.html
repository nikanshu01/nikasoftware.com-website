<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Nika Software</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contact-container">
    <div class="contact-left">
        <h2>Nika Software</h2>
        <p>www.nikasoftware.com</p>
    </div>

    <div class="contact-right">
        <h3>Get in Touch</h3>
        <p class="subtitle">Drop us a message and we'll get back to you.</p>
        
        <form id="nikaContactForm" action="https://formspree.io/f/xpqkjlov" method="POST">
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="Name" minlength="3" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label for="mobileNo">Mobile Number</label>
                <input type="tel" id="mobileNo" name="Mobile" pattern="[0-9]{10}" title="Please enter exactly 10 digits" placeholder="10-digit mobile number" required>
            </div>

            <div class="input-group">
                <label for="emailId">Email ID</label>
                <input type="email" id="emailId" name="email" placeholder="yourname@example.com" required>
            </div>

            <div class="input-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
            </div>

            <button type="submit" id="submitBtn">Submit</button>
            <p id="statusMessage" class="hidden"></p>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
